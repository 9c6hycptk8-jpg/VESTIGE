<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIC">
<title>FIC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
  }

  #app {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #overlay-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* TOP BAR */
  #top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding-top: calc(var(--safe-top) + 14px);
    padding-left: 20px;
    padding-right: 20px;
    padding-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
    pointer-events: none;
  }

  .top-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.28);
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    color: #fff;
    pointer-events: all;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .top-btn:active { background: rgba(255,255,255,0.18); transform: scale(0.93); }

  .top-placeholder { width: 42px; height: 42px; }

  /* HINT CENTER */
  #hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.35s;
  }
  #hint-main {
    color: rgba(255,255,255,0.82);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  #hint-sub {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* SCAN RING ANIMATION */
  @keyframes scanRing {
    0%   { transform: translate(-50%,-50%) scale(0.6); opacity: 0.7; }
    100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
  }
  .scan-ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 1.5px solid rgba(100,220,255,0.7);
    animation: scanRing 1.4s ease-out infinite;
    pointer-events: none;
    z-index: 8;
    display: none;
  }
  .scan-ring:nth-child(2) { animation-delay: 0.5s; }
  .scan-ring:nth-child(3) { animation-delay: 1s; }

  /* MODE HINT */
  #mode-hint {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 150px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* BOTTOM BAR */
  #bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding-bottom: calc(var(--safe-bottom) + 28px);
    padding-top: 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.3) 20%, rgba(0,0,0,0.58) 60%, rgba(0,0,0,0.72));
    display: flex;
    justify-content: center;
    gap: 32px;
    align-items: flex-end;
    z-index: 20;
  }

  .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
  }
  .mode-btn:active { transform: scale(0.93); }

  .mode-circle {
    width: 66px;
    height: 66px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.22);
    background: rgba(18,18,20,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    letter-spacing: -0.02em;
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }

  .mode-btn.active .mode-circle {
    border-color: rgba(90,210,255,0.95);
    color: #fff;
    background: rgba(40,120,200,0.3);
    box-shadow: 0 0 0 4px rgba(80,190,255,0.12), 0 0 20px rgba(60,170,255,0.2);
    transform: scale(1.06);
  }

  .mode-label {
    font-size: 9.5px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.38);
    text-transform: uppercase;
    font-weight: 500;
  }
  .mode-btn.active .mode-label { color: rgba(90,210,255,0.9); }

  #scan-label {
    position: absolute;
    top: calc(var(--safe-top) + 70px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(100,220,255,0.92);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
    text-shadow: 0 0 12px rgba(80,190,255,0.6);
  }
  #no-cam {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    gap: 14px;
    text-align: center;
    padding: 40px;
    z-index: 30;
  }
  #no-cam svg { opacity: 0.35; }

  /* FLASH ON CAPTURE */
  #flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.05s;
  }
</style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>

  <div id="top-bar">
    <div class="top-btn" id="capture-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div class="top-placeholder" id="clear-placeholder"></div>
    <div class="top-btn" id="clear-btn" style="display:none;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
  </div>

  <div class="scan-ring" id="ring1"></div>
  <div class="scan-ring" id="ring2"></div>
  <div class="scan-ring" id="ring3"></div>

  <div id="hint">
    <div id="hint-main">Trace the object's edge</div>
    <div id="hint-sub">Slide your finger around it</div>
  </div>

  <div id="mode-hint">Select a mode</div>
  <div id="scan-label"></div>

  <div id="bottom-bar">
    <div class="mode-btn" id="btn-f" data-mode="F">
      <div class="mode-circle">F</div>
      <div class="mode-label">Frequency</div>
    </div>
    <div class="mode-btn" id="btn-i" data-mode="I">
      <div class="mode-circle">I</div>
      <div class="mode-label">Intensity</div>
    </div>
    <div class="mode-btn" id="btn-c" data-mode="C">
      <div class="mode-circle">C</div>
      <div class="mode-label">Chronology</div>
    </div>
  </div>

  <div id="no-cam">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <div>Allow camera access<br>in Settings → Safari → Camera</div>
  </div>

  <div id="flash"></div>
</div>

<canvas id="capture-canvas" style="display:none;"></canvas>

<script>
const video      = document.getElementById('video');
const canvas     = document.getElementById('overlay-canvas');
const ctx        = canvas.getContext('2d');
const hint       = document.getElementById('hint');
const modeHint   = document.getElementById('mode-hint');
const clearBtn   = document.getElementById('clear-btn');
const clearPH    = document.getElementById('clear-placeholder');
const captureBtn = document.getElementById('capture-btn');
const noCam      = document.getElementById('no-cam');
const flash      = document.getElementById('flash');
const app        = document.getElementById('app');
const rings      = [document.getElementById('ring1'), document.getElementById('ring2'), document.getElementById('ring3')];

let path = [], isDrawing = false, pathClosed = false;
let activeMode = null;
let chronoPoints = [], heatPoints = [];
let chronoStep = 0, chronoTimer = null;

// F animation — time-based fade-in
let freqStartTime = null, freqDuration = 2000, freqAnimating = false;

// I animation — sequential reveal with time
let heatStep = 0, heatTimer = null, heatOrdered = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); redraw(); });

// Camera
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    video.play();
  } catch(e) {
    try {
      const s2 = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = s2;
      video.play();
    } catch(e2) {
      noCam.style.display = 'flex';
    }
  }
}
startCamera();

// Touch
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

canvas.addEventListener('touchstart', e => {
  if (pathClosed) return;
  e.preventDefault();
  isDrawing = true;
  path = [];
  path.push(getPos(e));
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!isDrawing || pathClosed) return;
  e.preventDefault();
  path.push(getPos(e));
  redraw();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (!isDrawing) return;
  isDrawing = false;
  if (path.length > 12) {
    path = smoothPath(path, 3);
    sealPath();
  } else {
    path = [];
    redraw();
  }
}, { passive: false });

// Mouse fallback
canvas.addEventListener('mousedown', e => {
  if (pathClosed) return;
  isDrawing = true; path = []; path.push(getPos(e));
});
canvas.addEventListener('mousemove', e => {
  if (!isDrawing || pathClosed) return;
  path.push(getPos(e)); redraw();
});
canvas.addEventListener('mouseup', e => {
  if (!isDrawing) return;
  isDrawing = false;
  if (path.length > 12) { path = smoothPath(path, 3); sealPath(); }
  else { path = []; redraw(); }
});

// Smooth path using sliding average to reduce jitter
function smoothPath(pts, passes) {
  let result = pts;
  for (let p = 0; p < passes; p++) {
    const s = [result[0]];
    for (let i = 1; i < result.length - 1; i++) {
      s.push({
        x: (result[i-1].x + result[i].x * 2 + result[i+1].x) / 4,
        y: (result[i-1].y + result[i].y * 2 + result[i+1].y) / 4
      });
    }
    s.push(result[result.length - 1]);
    result = s;
  }
  return result;
}

function sealPath() {
  pathClosed = true;
  hint.style.opacity = '0';
  clearBtn.style.display  = 'flex';
  clearPH.style.display   = 'none';
  modeHint.style.opacity  = '1';
  rings.forEach(r => r.style.display = 'none');
  generatePoints();
  showScanLabel(detectedObject);
  redraw();
}

function getBounds() {
  if (!path.length) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  path.forEach(p => {
    minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
  });
  return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY };
}

function pointInPath(px, py) {
  let inside = false;
  for (let i = 0, j = path.length - 1; i < path.length; j = i++) {
    const xi = path[i].x, yi = path[i].y, xj = path[j].x, yj = path[j].y;
    if (((yi > py) !== (yj > py)) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}

function randomInPath(margin) {
  const b = getBounds(); if (!b) return null;
  const m = margin || 0;
  for (let t = 0; t < 400; t++) {
    const x = b.minX + Math.random() * b.w;
    const y = b.minY + Math.random() * b.h;
    if (!pointInPath(x, y)) continue;
    if (m > 0) {
      // Check point is not too close to any edge of the path
      let tooClose = false;
      for (let i = 0, j = path.length - 1; i < path.length; j = i++) {
        const dx = path[i].x - x, dy = path[i].y - y;
        if (Math.sqrt(dx*dx + dy*dy) < m) { tooClose = true; break; }
      }
      if (tooClose) continue;
    }
    return { x, y };
  }
  return { x: b.minX + b.w / 2, y: b.minY + b.h / 2 };
}

// Detect object type based on bounding box aspect ratio
// MacBook (top-down): wider than tall → ratio > 1.2
// Backpack (diagonal front): taller than wide → ratio < 0.9
// Ambiguous in between → generic random
function detectObject(b) {
  const ratio = b.w / b.h;
  if (ratio > 1.15) return 'macbook';
  if (ratio < 0.92) return 'backpack';
  return 'generic';
}

// Map a relative [rx, ry] (0..1 within bounds) to absolute canvas coords
function rel(rx, ry, b) {
  return { x: b.minX + rx * b.w, y: b.minY + ry * b.h };
}

// Clamp a point inside the path with jitter
function jitter(p, amt) {
  return { x: p.x + (Math.random() - 0.5) * amt, y: p.y + (Math.random() - 0.5) * amt };
}

function generatePoints() {
  const b = getBounds();
  if (!b) return;
  const margin = Math.min(b.w, b.h) * 0.08;
  const maxR   = Math.min(b.w, b.h) * 0.20;

  chronoPoints = [];
  heatPoints   = [];

  const thermalValue = { darkred: 1.0, red: 0.84, orange: 0.66, yellow: 0.50, blue: 0.22, lightblue: 0.06 };

  // Hot colors cluster together, cold colors far away
  const hotColors  = ['darkred', 'red', 'orange', 'yellow'];
  const coldColors = ['blue', 'lightblue'];

  // 1-2 blobs per color
  const allAssignments = [];
  [...hotColors, ...coldColors].forEach(color => {
    const n = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < n; i++) allAssignments.push(color);
  });

  // Pick a hot anchor point
  let hotAnchor = null;
  for (let t = 0; t < 300; t++) {
    const c = randomInPath(margin);
    if (c) { hotAnchor = c; break; }
  }

  const hotRadius    = Math.min(b.w, b.h) * 0.30; // hot colors stay within this of anchor
  const coldMinDist  = Math.min(b.w, b.h) * 0.40; // cold colors at least this far from anchor
  const minCross     = maxR * 1.80; // different-color cores don't overlap (oil-drop)
  const minSame      = maxR * 0.40; // same color can be close (they fuse)

  // Neighbor preference for hot colors
  const neighborPref = {
    darkred: ['darkred', 'red'],
    red:     ['darkred', 'red', 'orange'],
    orange:  ['red', 'orange', 'yellow'],
    yellow:  ['orange', 'yellow'],
  };

  const placed = [];

  for (const color of allAssignments) {
    const isHot  = hotColors.includes(color);
    const isCold = coldColors.includes(color);
    let p = null;

    for (let attempt = 0; attempt < 600; attempt++) {
      const c = randomInPath(margin);
      if (!c) continue;

      if (hotAnchor) {
        const dx = c.x - hotAnchor.x, dy = c.y - hotAnchor.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (isHot  && dist > hotRadius)   continue;
        if (isCold && dist < coldMinDist) continue;
      }

      // Hot: prefer proximity to neighbor colors
      if (isHot && placed.length > 0) {
        const prefs = neighborPref[color] || [];
        const neighbors = placed.filter(pp => prefs.includes(pp.color));
        if (neighbors.length > 0) {
          const nearest = Math.min(...neighbors.map(pp => {
            const dx = pp.x - c.x, dy = pp.y - c.y;
            return Math.sqrt(dx*dx + dy*dy);
          }));
          if (nearest > maxR * 2.8) continue;
        }
      }

      // Oil-drop: no core overlap between different colors
      const conflict = placed.some(pp => {
        const dx = pp.x - c.x, dy = pp.y - c.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        return pp.color === color ? dist < minSame : dist < minCross;
      });
      if (!conflict) { p = c; break; }
    }

    // Fallback: relax neighbor constraint
    if (!p) {
      for (let attempt = 0; attempt < 200; attempt++) {
        const c = randomInPath(margin * 0.5);
        if (!c) continue;
        if (hotAnchor) {
          const dx = c.x - hotAnchor.x, dy = c.y - hotAnchor.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (isHot  && dist > hotRadius * 1.4)   continue;
          if (isCold && dist < coldMinDist * 0.6) continue;
        }
        const conflict = placed.some(pp => {
          if (pp.color === color) return false;
          const dx = pp.x - c.x, dy = pp.y - c.y;
          return Math.sqrt(dx*dx + dy*dy) < minCross * 0.7;
        });
        if (!conflict) { p = c; break; }
      }
    }
    if (!p) continue;

    const r = maxR * (0.55 + Math.random() * 0.45);
    placed.push({ ...p, color, r });
    heatPoints.push({ x: p.x, y: p.y, r, v: thermalValue[color], color });
    chronoPoints.push({ x: p.x, y: p.y, color });
  }

  // Sort hottest→coldest for I
  heatOrdered = [...heatPoints].sort((a, b) => b.v - a.v);
  // Sort C in exact display order: darkred, red, orange, yellow, blue, lightblue
  const chronoOrder = { darkred: 0, red: 1, orange: 2, yellow: 3, blue: 4, lightblue: 5 };
  chronoPoints.sort((a, b) => (chronoOrder[a.color] ?? 99) - (chronoOrder[b.color] ?? 99));
  computeOilSpreads();
}

// Show brief "scanning" label
let detectedObject = null;
function showScanLabel(obj) {
  const labels = { macbook: 'MacBook Air detected', backpack: 'Backpack detected', generic: 'Object detected' };
  const el = document.getElementById('scan-label');
  el.textContent = labels[obj] || 'Object detected';
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2200);
}

// MacBook contact zones (top-down view):
// Keyboard: y 52-72% of height, x 8-92%
// Most used keys (center row): y 58-68%, x 15-85%
// Trackpad: y 75-92%, x 28-72%
// Top hinge area: y 0-8%, x 10-90%
// Power/Touch ID top right: y 50-55%, x 88-95%
function generateMacBook(b) {
  const zones = [
    // Frequency & Chronology points — realistic high-contact areas
    rel(0.50, 0.62, b), // spacebar center
    rel(0.35, 0.60, b), // left home row (A,S,D,F)
    rel(0.65, 0.60, b), // right home row (J,K,L)
    rel(0.50, 0.83, b), // trackpad center
    rel(0.38, 0.83, b), // trackpad left
    rel(0.62, 0.83, b), // trackpad right
    rel(0.90, 0.53, b), // delete key
    rel(0.50, 0.55, b), // number row center
  ];

  // Pick 4-8 of those with small jitter
  const shuffled = zones.sort(() => Math.random() - 0.5);
  const count = 4 + Math.floor(Math.random() * 5);
  chronoPoints = shuffled.slice(0, count).map(p => jitter(p, b.w * 0.03));

  // Heatmap — hot zones: keyboard area and trackpad
  heatPoints = [];
  const hc = 24 + Math.floor(Math.random() * 6);
  const maxR = Math.max(b.w, b.h) * 0.38;

  // Hot keyboard region
  const keyboardZone = [
    { rx: 0.50, ry: 0.62, v: 0.95 },
    { rx: 0.35, ry: 0.60, v: 0.90 },
    { rx: 0.65, ry: 0.60, v: 0.88 },
    { rx: 0.50, ry: 0.57, v: 0.82 },
    { rx: 0.25, ry: 0.63, v: 0.75 },
    { rx: 0.75, ry: 0.63, v: 0.75 },
    { rx: 0.90, ry: 0.53, v: 0.85 }, // delete
    // Trackpad hot
    { rx: 0.50, ry: 0.83, v: 0.88 },
    { rx: 0.40, ry: 0.80, v: 0.80 },
    { rx: 0.60, ry: 0.80, v: 0.80 },
    // Cool zones: screen area, sides
    { rx: 0.50, ry: 0.25, v: 0.15 },
    { rx: 0.20, ry: 0.30, v: 0.10 },
    { rx: 0.80, ry: 0.30, v: 0.12 },
    { rx: 0.10, ry: 0.65, v: 0.20 },
    { rx: 0.90, ry: 0.65, v: 0.18 },
  ];

  keyboardZone.forEach(z => {
    const p = rel(z.rx, z.ry, b);
    heatPoints.push({ ...jitter(p, b.w * 0.04), r: maxR * (0.4 + Math.random() * 0.5), v: z.v });
  });

  // Fill remaining with random inside path
  for (let i = heatPoints.length; i < hc; i++) {
    const p = randomInPath();
    if (p) heatPoints.push({ ...p, r: maxR * (0.3 + Math.random() * 0.4), v: Math.random() * 0.4 });
  }
}

// Backpack contact zones (diagonal front view):
// Handle top: y 0-12%, x 30-70%
// Main zipper (diagonal): runs from top-left to mid-right
// Front pocket zipper: y 35-55%, x 20-75%
// Side zipper pulls: x 15-25%, y 40-70%
// Base: y 88-100%, x 20-80%
// Shoulder strap attachment: x 10-20%, y 15-35%
function generateBackpack(b) {
  const zones = [
    rel(0.50, 0.06, b), // handle top center
    rel(0.42, 0.06, b), // handle left
    rel(0.58, 0.06, b), // handle right
    rel(0.35, 0.42, b), // front zipper left pull
    rel(0.62, 0.38, b), // front zipper right
    rel(0.20, 0.55, b), // side zipper pull
    rel(0.50, 0.93, b), // base center
    rel(0.15, 0.25, b), // strap top attachment
  ];

  const shuffled = zones.sort(() => Math.random() - 0.5);
  const count = 4 + Math.floor(Math.random() * 5);
  chronoPoints = shuffled.slice(0, count).map(p => jitter(p, b.w * 0.04));

  heatPoints = [];
  const hc = 24 + Math.floor(Math.random() * 6);
  const maxR = Math.max(b.w, b.h) * 0.38;

  const backpackZone = [
    { rx: 0.50, ry: 0.06, v: 0.95 }, // handle — hottest
    { rx: 0.42, ry: 0.06, v: 0.92 },
    { rx: 0.58, ry: 0.06, v: 0.90 },
    { rx: 0.35, ry: 0.42, v: 0.82 }, // front zipper
    { rx: 0.55, ry: 0.38, v: 0.78 },
    { rx: 0.20, ry: 0.55, v: 0.75 }, // side zipper
    { rx: 0.20, ry: 0.65, v: 0.70 },
    { rx: 0.15, ry: 0.25, v: 0.68 }, // strap
    { rx: 0.50, ry: 0.93, v: 0.55 }, // base
    { rx: 0.40, ry: 0.93, v: 0.50 },
    // Cool zones: main body panels
    { rx: 0.65, ry: 0.60, v: 0.15 },
    { rx: 0.70, ry: 0.75, v: 0.12 },
    { rx: 0.55, ry: 0.70, v: 0.18 },
    { rx: 0.80, ry: 0.50, v: 0.10 },
  ];

  backpackZone.forEach(z => {
    const p = rel(z.rx, z.ry, b);
    heatPoints.push({ ...jitter(p, b.w * 0.04), r: maxR * (0.4 + Math.random() * 0.5), v: z.v });
  });

  for (let i = heatPoints.length; i < hc; i++) {
    const p = randomInPath();
    if (p) heatPoints.push({ ...p, r: maxR * (0.3 + Math.random() * 0.4), v: Math.random() * 0.3 });
  }
}

function generateGeneric(b) {
  const count = 4 + Math.floor(Math.random() * 5);
  chronoPoints = [];
  for (let i = 0; i < count; i++) { const p = randomInPath(); if (p) chronoPoints.push(p); }
  heatPoints = [];
  const hc = 22 + Math.floor(Math.random() * 8);
  const maxR = Math.max(b.w, b.h) * 0.45;
  for (let i = 0; i < hc; i++) {
    const p = randomInPath();
    if (p) heatPoints.push({ ...p, r: maxR * (0.5 + Math.random() * 0.5), v: Math.random() });
  }
}

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!pathClosed) return;
    const mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    stopChrono(); stopFreq(); stopHeat();
    if (activeMode === mode) { activeMode = null; redraw(); return; }
    btn.classList.add('active');
    activeMode = mode;
    if (mode === 'C') startChrono();
    if (mode === 'F') startFreq();
    if (mode === 'I') startHeat();
    redraw();
  });
});

function stopChrono() { if (chronoTimer) { clearInterval(chronoTimer); chronoTimer = null; } chronoStep = 0; }
function startChrono() {
  chronoStep = 0;
  chronoTimer = setInterval(() => {
    chronoStep++;
    redraw();
    if (chronoStep >= chronoPoints.length) {
      clearInterval(chronoTimer);
      chronoTimer = null;
    }
  }, 850);
}

// F: all points fade in together over 2 seconds via RAF
function stopFreq() { freqStartTime = null; freqAnimating = false; }
function startFreq() {
  freqStartTime = performance.now();
  freqAnimating = true;
}

// I: each zone fades in over 3s, next starts at 1.5s after previous begins
let heatStartTimes = [];
let heatAnimating  = false;

function stopHeat() {
  if (heatTimer) { clearInterval(heatTimer); heatTimer = null; }
  heatStep = 0;
  heatStartTimes = [];
  heatAnimating  = false;
}

function startHeat() {
  const now = performance.now();
  const groupOrder = ['darkred', 'red', 'orange', 'yellow', 'blue', 'lightblue'];
  const groupStartMap = {};
  let delay = 0;
  groupOrder.forEach(color => {
    if (heatOrdered.some(h => h.color === color)) {
      groupStartMap[color] = now + delay;
      delay += 1500;
    }
  });
  heatStartTimes = heatOrdered.map(h => groupStartMap[h.color] || now);
  heatAnimating = true;
  const totalDuration = delay + 3000;
  heatTimer = setTimeout(() => {
    heatAnimating = false;
    heatTimer = null;
    redraw();
  }, totalDuration);
}

// Clear
clearBtn.addEventListener('click', () => {
  path = []; pathClosed = false; activeMode = null;
  stopChrono(); stopFreq(); stopHeat();
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  clearBtn.style.display = 'none';
  clearPH.style.display  = 'block';
  hint.style.opacity     = '1';
  modeHint.style.opacity = '0';
  redraw();
});

// Capture
captureBtn.addEventListener('click', () => {
  const cc = document.getElementById('capture-canvas');
  cc.width  = canvas.width;
  cc.height = canvas.height;
  const cctx = cc.getContext('2d');
  try { cctx.drawImage(video, 0, 0, cc.width, cc.height); } catch(e) {}
  cctx.drawImage(canvas, 0, 0);

  // Flash
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.transition = 'opacity 0.4s'; flash.style.opacity = '0'; }, 60);
  setTimeout(() => { flash.style.transition = ''; }, 500);

  const url = cc.toDataURL('image/png');
  const a   = document.createElement('a');
  a.href    = url;
  a.download = 'FIC_scan.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

function buildPathShape() {
  ctx.beginPath();
  if (path.length < 2) return;
  ctx.moveTo(path[0].x, path[0].y);
  for (let i = 1; i < path.length - 1; i++) {
    const mx = (path[i].x + path[i+1].x) / 2;
    const my = (path[i].y + path[i+1].y) / 2;
    ctx.quadraticCurveTo(path[i].x, path[i].y, mx, my);
  }
  ctx.lineTo(path[path.length-1].x, path[path.length-1].y);
  if (pathClosed) ctx.closePath();
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!path.length) return;

  ctx.save();
  buildPathShape();

  if (!pathClosed) {
    ctx.strokeStyle = 'rgba(100,210,255,0.8)';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.stroke();
    ctx.restore();
    return;
  }

  // Solid perimeter glow
  ctx.shadowColor = 'rgba(80,190,255,0.6)';
  ctx.shadowBlur  = 6;
  ctx.strokeStyle = 'rgba(100,215,255,0.92)';
  ctx.lineWidth   = 2;
  ctx.setLineDash([]);
  ctx.stroke();
  ctx.restore();

  if (!activeMode) return;

  // Effects inside clip
  ctx.save();
  buildPathShape();
  ctx.clip();

  if      (activeMode === 'F') drawFrequency();
  else if (activeMode === 'I') drawIntensity();
  else if (activeMode === 'C') drawChronology();

  ctx.restore();

  // Re-draw perimeter on top
  ctx.save();
  buildPathShape();
  ctx.shadowColor = 'rgba(80,190,255,0.5)';
  ctx.shadowBlur  = 5;
  ctx.strokeStyle = 'rgba(100,215,255,0.92)';
  ctx.lineWidth   = 2;
  ctx.stroke();
  ctx.restore();
}

// FREQUENCY — all chronoPoints shown, all purple, no numbers
function drawFrequency() {
  let opacity = 1.0;
  if (freqStartTime !== null) {
    const elapsed = performance.now() - freqStartTime;
    opacity = Math.min(elapsed / freqDuration, 1.0);
  }

  // Use ALL chronoPoints (same points as C, including blue ones)
  chronoPoints.forEach(p => {
    const r = 9;
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 1.5);
    grad.addColorStop(0,   `rgba(160,80,255,${0.55 * opacity})`);
    grad.addColorStop(0.5, `rgba(120,40,220,${0.22 * opacity})`);
    grad.addColorStop(1,   'rgba(80,0,180,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    const core = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 0.7);
    core.addColorStop(0,   `rgba(230,200,255,${0.92 * opacity})`);
    core.addColorStop(0.6, `rgba(180,100,255,${0.5  * opacity})`);
    core.addColorStop(1,   'rgba(120,40,220,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = core;
    ctx.fill();
  });
}

// INTENSITY — heatmap via Canvas2D (GPU-accelerated, no pixel loops)
// Palette: no purples. Cold = dark blue center → light blue edges.
// Hot = dark red → red → orange → yellow. Organic blob shapes via canvas transform.
// Fade-in: 3s global. Black base: 20% opacity.

// Direct color definitions per zone — no purple, ironbow-free
const ZONE_COLORS = {
  darkred:   { core: [140,  0,  0], mid: [200, 15,  0], halo: [255, 60,  0] },
  red:       { core: [230, 15,  0], mid: [255, 70,  0], halo: [255,130, 20] },
  orange:    { core: [255,110,  0], mid: [255,170,  0], halo: [255,220, 60] },
  yellow:    { core: [255,220,  0], mid: [255,240,100], halo: [255,255,200] },
  blue:      { core: [ 10, 20,120], mid: [ 20, 50,190], halo: [ 60,120,255] },
  lightblue: { core: [ 30,100,220], mid: [ 70,160,255], halo: [150,220,255] },
};

// Each blob gets a stable random shape transform seeded by index
function getBlobTransform(idx) {
  // Deterministic per-blob shape using index as seed
  const s = idx * 7919 + 1;
  const scaleX  = 0.65 + (((s * 1664525 + 1013904223) >>> 0) % 1000) / 1000 * 0.70; // 0.65–1.35
  const scaleY  = 0.65 + (((s * 22695477 + 1)         >>> 0) % 1000) / 1000 * 0.70;
  const rot     = (((s * 214013 + 2531011)             >>> 0) % 1000) / 1000 * Math.PI; // 0–π
  const skewAmt = (((s * 6364136 + 1442695)            >>> 0) % 1000) / 1000 * 0.25 - 0.125; // ±0.125
  return { scaleX, scaleY, rot, skewAmt };
}

// Noise canvas refreshed every N frames
let noiseCanvas = null, noiseCtx2 = null, noiseFrame = 0;
function getNoiseCanvas(w, h) {
  noiseFrame++;
  if (!noiseCanvas || noiseCanvas.width !== w || noiseCanvas.height !== h) {
    noiseCanvas = document.createElement('canvas');
    noiseCanvas.width = w; noiseCanvas.height = h;
    noiseCtx2 = noiseCanvas.getContext('2d');
  }
  if (noiseFrame % 3 === 0) {
    const id = noiseCtx2.createImageData(w, h);
    const d  = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * 30 | 0;
      d[i] = d[i+1] = d[i+2] = 128 + n;
      d[i+3] = 18;
    }
    noiseCtx2.putImageData(id, 0, 0);
  }
  return noiseCanvas;
}

// Draw a single organic blob using canvas transform for non-circular shape
function drawOrgBlob(cx, cy, rx, ry, rot, skew, grad) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.transform(1, skew, 0, 1, 0, 0); // subtle skew
  ctx.scale(rx, ry);
  ctx.beginPath();
  ctx.arc(0, 0, 1, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

// Per-blob oil spread params — computed once when points are generated, stable across frames
let oilSpreads = [];
function computeOilSpreads() {
  oilSpreads = heatOrdered.map((h, i) => {
    const s = i * 7919 + 1;
    // Primary spread axis angle — fully random direction
    const ang1 = (((s * 214013  + 2531011)  >>> 0) % 1000) / 1000 * Math.PI * 2;
    // Secondary spread axis — offset 60-140° from primary
    const offset = Math.PI * (0.33 + (((s * 1664525 + 1013904223) >>> 0) % 1000) / 1000 * 0.44);
    const ang2 = ang1 + offset;
    // How much each axis stretches (1.0 = circle, up to 1.55 = elongated)
    const stretch1 = 1.12 + (((s * 22695477 + 1) >>> 0) % 1000) / 1000 * 0.43;
    const stretch2 = 1.08 + (((s * 6364136  + 1442695) >>> 0) % 1000) / 1000 * 0.35;
    return { ang1, ang2, stretch1, stretch2 };
  });
}

// Draw one oil-drop blob: ellipse stretched along ang1 and ang2, center stays fixed
function drawOilBlob(cx, cy, baseR, sp, t, gradFn) {
  // Ease: slow viscous expansion (sqrt-ish for oil feel)
  const ease = Math.pow(t, 0.55);
  // Scale along primary axis
  const rx1 = baseR * (1 + (sp.stretch1 - 1) * ease);
  // Scale along secondary axis (independent, different direction)
  const rx2 = baseR * (1 + (sp.stretch2 - 1) * ease);
  // Perpendicular axes
  const cos1 = Math.cos(sp.ang1), sin1 = Math.sin(sp.ang1);
  const cos2 = Math.cos(sp.ang2), sin2 = Math.sin(sp.ang2);

  // We draw the blob as a scaled ellipse along ang1 using ctx transform,
  // then overlay a second stretched pass along ang2 at lower opacity for the second lobe
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(sp.ang1);
  ctx.scale(rx1 / baseR, 1.0);
  const g1 = ctx.createRadialGradient(0, 0, 0, 0, 0, baseR * 1.5);
  gradFn(g1, t);
  ctx.beginPath();
  ctx.arc(0, 0, baseR * 1.5, 0, Math.PI * 2);
  ctx.fillStyle = g1;
  ctx.fill();
  ctx.restore();

  // Second lobe along ang2 — slightly softer
  ctx.save();
  ctx.globalAlpha = 0.72;
  ctx.translate(cx, cy);
  ctx.rotate(sp.ang2);
  ctx.scale(rx2 / baseR, 1.0);
  const g2 = ctx.createRadialGradient(0, 0, 0, 0, 0, baseR * 1.3);
  gradFn(g2, t * 0.85);
  ctx.beginPath();
  ctx.arc(0, 0, baseR * 1.3, 0, Math.PI * 2);
  ctx.fillStyle = g2;
  ctx.fill();
  ctx.restore();
}

function drawIntensity() {
  const now = performance.now();
  const W = canvas.width;
  const H = canvas.height;

  // --- Global fade-in: 3 seconds ---
  let globalT = 1.0;
  if (heatStartTimes.length > 0) {
    const elapsed = now - heatStartTimes[0];
    globalT = Math.min(Math.max(elapsed / 3000, 0), 1);
    globalT = globalT < 0.5 ? 2*globalT*globalT : -1+(4-2*globalT)*globalT;
  }
  if (globalT <= 0) return;

  // --- Per-group fade-in ---
  const groupOrder = ['darkred', 'red', 'orange', 'yellow', 'blue', 'lightblue'];
  const groupT = {};
  const groups = {};
  heatOrdered.forEach((h, i) => {
    if (!groups[h.color]) groups[h.color] = { blobs: [], startTime: null };
    groups[h.color].blobs.push({ ...h, blobIdx: i });
    const st = heatStartTimes[i];
    if (groups[h.color].startTime === null || st < groups[h.color].startTime)
      groups[h.color].startTime = st;
  });
  groupOrder.forEach(color => {
    if (!groups[color]) { groupT[color] = 0; return; }
    const el = now - groups[color].startTime;
    let t = Math.min(Math.max(el / 3000, 0), 1);
    t = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    groupT[color] = t;
  });

  // --- Layer 1: black base at exactly 20% opacity ---
  ctx.fillStyle = `rgba(0,0,0,${0.20 * globalT})`;
  ctx.fill();

  // --- Layer 2: oil-drop blobs, coldest → hottest (painter's algorithm) ---
  const renderOrder = ['lightblue', 'blue', 'yellow', 'orange', 'red', 'darkred'];
  renderOrder.forEach(color => {
    const group = groups[color];
    if (!group) return;
    const t = (groupT[color] || 0) * globalT;
    if (t <= 0) return;
    const def = ZONE_COLORS[color];
    const [cr, cg, cb] = def.core;
    const [mr, mg, mb] = def.mid;
    const [hr2, hg2, hb2] = def.halo;

    group.blobs.forEach(h => {
      const sp = oilSpreads[h.blobIdx] || { ang1: 0, ang2: Math.PI/2, stretch1: 1.3, stretch2: 1.2 };

      // Halo gradient function
      const haloFn = (g, opacity) => {
        g.addColorStop(0,   `rgba(${mr},${mg},${mb},${0.40 * opacity})`);
        g.addColorStop(0.5, `rgba(${cr},${cg},${cb},${0.16 * opacity})`);
        g.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
      };
      drawOilBlob(h.x, h.y, h.r, sp, t, haloFn);

      // Core — tighter, brighter
      ctx.save();
      ctx.translate(h.x, h.y);
      ctx.rotate(sp.ang1);
      const coreEase = Math.pow(t, 0.55);
      ctx.scale(1 + (sp.stretch1 - 1) * coreEase * 0.6, 1.0);
      const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, h.r * 0.78);
      coreGrad.addColorStop(0,    `rgba(${hr2},${hg2},${hb2},${0.90 * t})`);
      coreGrad.addColorStop(0.35, `rgba(${mr},${mg},${mb},${0.65 * t})`);
      coreGrad.addColorStop(0.7,  `rgba(${cr},${cg},${cb},${0.25 * t})`);
      coreGrad.addColorStop(1,    `rgba(${cr},${cg},${cb},0)`);
      ctx.beginPath();
      ctx.arc(0, 0, h.r * 0.78, 0, Math.PI * 2);
      ctx.fillStyle = coreGrad;
      ctx.fill();
      ctx.restore();
    });
  });

  // --- Layer 3: stochastic noise overlay ---
  const noiseW = Math.ceil(W / 3), noiseH = Math.ceil(H / 3);
  const nc = getNoiseCanvas(noiseW, noiseH);
  ctx.save();
  ctx.globalAlpha = 0.09 * globalT;
  ctx.globalCompositeOperation = 'overlay';
  ctx.drawImage(nc, 0, 0, W, H);
  ctx.restore();

  // --- Layer 4: Bloom on hot zones ---
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const bloomDefs = {
    darkred: [200, 30,  0],
    red:     [255, 80,  0],
    orange:  [255,170,  0],
    yellow:  [255,240, 80],
  };
  Object.entries(bloomDefs).forEach(([color, [br, bg, bb]]) => {
    const group = groups[color];
    if (!group) return;
    const t = (groupT[color] || 0) * globalT;
    if (t <= 0) return;
    group.blobs.forEach(h => {
      const sp = oilSpreads[h.blobIdx] || { ang1: 0, stretch1: 1.3 };
      ctx.save();
      ctx.translate(h.x, h.y);
      ctx.rotate(sp.ang1);
      const coreEase = Math.pow(t, 0.55);
      ctx.scale(1 + (sp.stretch1 - 1) * coreEase, 1.0);
      const bloom = ctx.createRadialGradient(0, 0, h.r * 0.05, 0, 0, h.r * 2.6);
      bloom.addColorStop(0,   `rgba(${br},${bg},${bb},${0.20 * t})`);
      bloom.addColorStop(0.4, `rgba(${br},${bg},${bb},${0.08 * t})`);
      bloom.addColorStop(1,   `rgba(${br},${bg},${bb},0)`);
      ctx.beginPath();
      ctx.arc(0, 0, h.r * 2.6, 0, Math.PI * 2);
      ctx.fillStyle = bloom;
      ctx.fill();
      ctx.restore();
    });
  });
  ctx.restore();
}

// CHRONOLOGY — sequential colored numbered points
// Color order: darkred (most intense red) → red → orange → yellow → blue → lightblue
const CHRONO_COLOR_MAP = {
  darkred:   { fill: 'rgba(180,0,0,0.97)',    glow: 'rgba(180,0,0,0.4)'    },
  red:       { fill: 'rgba(255,30,0,0.97)',   glow: 'rgba(255,30,0,0.4)'   },
  orange:    { fill: 'rgba(255,140,0,0.97)',  glow: 'rgba(255,140,0,0.4)'  },
  yellow:    { fill: 'rgba(255,230,0,0.97)',  glow: 'rgba(255,230,0,0.4)'  },
  blue:      { fill: 'rgba(30,80,255,0.97)',  glow: 'rgba(30,80,255,0.4)'  },
  lightblue: { fill: 'rgba(60,190,255,0.97)', glow: 'rgba(60,190,255,0.4)' },
};

function drawChronology() {
  const showing = Math.min(chronoStep, chronoPoints.length);
  for (let i = 0; i < showing; i++) {
    const p = chronoPoints[i];
    const c = CHRONO_COLOR_MAP[p.color] || CHRONO_COLOR_MAP.blue;

    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 36);
    grad.addColorStop(0, c.glow);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, 36, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
    ctx.fillStyle = c.fill;
    ctx.fill();

    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, p.x, p.y);
  }
}

// Render loop — drives F and I fade-in animations
let loopFrame = 0;
function loop() {
  loopFrame++;
  if (pathClosed && activeMode === 'F' && freqAnimating) redraw();
  // I: redraw during animation, then every 4th frame for noise only
  if (pathClosed && activeMode === 'I' && (heatAnimating || loopFrame % 4 === 0)) redraw();
  requestAnimationFrame(loop);
}
loop();
</script>
