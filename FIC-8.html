<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIC">
<title>FIC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
  }

  #app {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #overlay-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* TOP BAR */
  #top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding-top: calc(var(--safe-top) + 14px);
    padding-left: 20px;
    padding-right: 20px;
    padding-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
    pointer-events: none;
  }

  .top-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.28);
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    color: #fff;
    pointer-events: all;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .top-btn:active { background: rgba(255,255,255,0.18); transform: scale(0.93); }

  .top-placeholder { width: 42px; height: 42px; }

  /* HINT CENTER */
  #hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.35s;
  }
  #hint-main {
    color: rgba(255,255,255,0.82);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  #hint-sub {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* SCAN RING ANIMATION */
  @keyframes scanRing {
    0%   { transform: translate(-50%,-50%) scale(0.6); opacity: 0.7; }
    100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
  }
  .scan-ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 1.5px solid rgba(100,220,255,0.7);
    animation: scanRing 1.4s ease-out infinite;
    pointer-events: none;
    z-index: 8;
    display: none;
  }
  .scan-ring:nth-child(2) { animation-delay: 0.5s; }
  .scan-ring:nth-child(3) { animation-delay: 1s; }

  /* MODE HINT */
  #mode-hint {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 148px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* BOTTOM BAR */
  #bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding-bottom: calc(var(--safe-bottom) + 28px);
    padding-top: 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.38) 20%, rgba(0,0,0,0.66) 60%, rgba(0,0,0,0.80));
    display: flex;
    justify-content: center;
    gap: 32px;
    align-items: flex-end;
    z-index: 20;
  }

  .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
  }
  .mode-btn:active { transform: scale(0.93); }

  .mode-circle {
    width: 66px;
    height: 66px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.22);
    background: rgba(18,18,20,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    letter-spacing: -0.02em;
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }

  .mode-btn.active .mode-circle {
    border-color: rgba(90,210,255,0.95);
    color: #fff;
    background: rgba(40,120,200,0.3);
    box-shadow: 0 0 0 4px rgba(80,190,255,0.12), 0 0 20px rgba(60,170,255,0.2);
    transform: scale(1.06);
  }

  .mode-label {
    font-size: 9.5px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.38);
    text-transform: uppercase;
    font-weight: 500;
  }
  .mode-btn.active .mode-label { color: rgba(90,210,255,0.9); }

  #scan-label {
    position: absolute;
    top: calc(var(--safe-top) + 70px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(100,220,255,0.92);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
    text-shadow: 0 0 12px rgba(80,190,255,0.6);
  }
  #no-cam {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    gap: 14px;
    text-align: center;
    padding: 40px;
    z-index: 30;
  }
  #no-cam svg { opacity: 0.35; }

  /* FLASH ON CAPTURE */
  #flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.05s;
  }
</style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>

  <div id="top-bar">
    <div class="top-btn" id="capture-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div class="top-placeholder" id="clear-placeholder"></div>
    <div class="top-btn" id="clear-btn" style="display:none;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
  </div>

  <div class="scan-ring" id="ring1"></div>
  <div class="scan-ring" id="ring2"></div>
  <div class="scan-ring" id="ring3"></div>

  <div id="hint">
    <div id="hint-main">Trace the object's edge</div>
    <div id="hint-sub">Slide your finger around it</div>
  </div>

  <div id="mode-hint">Select a mode</div>
  <div id="scan-label"></div>

  <div id="bottom-bar">
    <div class="mode-btn" id="btn-f" data-mode="F">
      <div class="mode-circle">F</div>
      <div class="mode-label">Frequency</div>
    </div>
    <div class="mode-btn" id="btn-i" data-mode="I">
      <div class="mode-circle">I</div>
      <div class="mode-label">Intensity</div>
    </div>
    <div class="mode-btn" id="btn-c" data-mode="C">
      <div class="mode-circle">C</div>
      <div class="mode-label">Chronology</div>
    </div>
  </div>

  <div id="no-cam">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <div>Allow camera access<br>in Settings → Safari → Camera</div>
  </div>

  <div id="flash"></div>
</div>

<canvas id="capture-canvas" style="display:none;"></canvas>

<script>
const video      = document.getElementById('video');
const canvas     = document.getElementById('overlay-canvas');
const ctx        = canvas.getContext('2d');
const hint       = document.getElementById('hint');
const modeHint   = document.getElementById('mode-hint');
const clearBtn   = document.getElementById('clear-btn');
const clearPH    = document.getElementById('clear-placeholder');
const captureBtn = document.getElementById('capture-btn');
const noCam      = document.getElementById('no-cam');
const flash      = document.getElementById('flash');
const app        = document.getElementById('app');
const rings      = [document.getElementById('ring1'), document.getElementById('ring2'), document.getElementById('ring3')];

let path = [], isDrawing = false, pathClosed = false;
let activeMode = null;
let chronoPoints = [], heatPoints = [];
let chronoStep = 0, chronoTimer = null;

// F animation — time-based fade-in
let freqStartTime = null, freqDuration = 2000, freqAnimating = false;

// I animation — sequential reveal with time
let heatStep = 0, heatTimer = null, heatOrdered = [];

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(dpr, dpr);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
}
resize();
window.addEventListener('resize', () => { resize(); redraw(); });

// Camera
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    video.play();
  } catch(e) {
    try {
      const s2 = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = s2;
      video.play();
    } catch(e2) {
      noCam.style.display = 'flex';
    }
  }
}
startCamera();

// Touch
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

canvas.addEventListener('touchstart', e => {
  if (pathClosed) return;
  e.preventDefault();
  isDrawing = true;
  path = [];
  path.push(getPos(e));
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!isDrawing || pathClosed) return;
  e.preventDefault();
  path.push(getPos(e));
  redraw();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (!isDrawing) return;
  isDrawing = false;
  if (path.length > 12) {
    path = smoothPath(path, 3);
    sealPath();
  } else {
    path = [];
    redraw();
  }
}, { passive: false });

// Mouse fallback
canvas.addEventListener('mousedown', e => {
  if (pathClosed) return;
  isDrawing = true; path = []; path.push(getPos(e));
});
canvas.addEventListener('mousemove', e => {
  if (!isDrawing || pathClosed) return;
  path.push(getPos(e)); redraw();
});
canvas.addEventListener('mouseup', e => {
  if (!isDrawing) return;
  isDrawing = false;
  if (path.length > 12) { path = smoothPath(path, 3); sealPath(); }
  else { path = []; redraw(); }
});

// Smooth path using sliding average to reduce jitter
function smoothPath(pts, passes) {
  let result = pts;
  for (let p = 0; p < passes; p++) {
    const s = [result[0]];
    for (let i = 1; i < result.length - 1; i++) {
      s.push({
        x: (result[i-1].x + result[i].x * 2 + result[i+1].x) / 4,
        y: (result[i-1].y + result[i].y * 2 + result[i+1].y) / 4
      });
    }
    s.push(result[result.length - 1]);
    result = s;
  }
  return result;
}

function sealPath() {
  pathClosed = true;
  hint.style.opacity = '0';
  clearBtn.style.display  = 'flex';
  clearPH.style.display   = 'none';
  modeHint.style.opacity  = '1';
  rings.forEach(r => r.style.display = 'none');
  generatePoints();
  showScanLabel(detectedObject);
  redraw();
}

function getBounds() {
  if (!path.length) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  path.forEach(p => {
    minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
  });
  return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY };
}

function pointInPath(px, py) {
  let inside = false;
  for (let i = 0, j = path.length - 1; i < path.length; j = i++) {
    const xi = path[i].x, yi = path[i].y, xj = path[j].x, yj = path[j].y;
    if (((yi > py) !== (yj > py)) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}

function randomInPath(margin) {
  const b = getBounds(); if (!b) return null;
  const m = margin || 0;
  for (let t = 0; t < 400; t++) {
    const x = b.minX + Math.random() * b.w;
    const y = b.minY + Math.random() * b.h;
    if (!pointInPath(x, y)) continue;
    if (m > 0) {
      // Check point is not too close to any edge of the path
      let tooClose = false;
      for (let i = 0, j = path.length - 1; i < path.length; j = i++) {
        const dx = path[i].x - x, dy = path[i].y - y;
        if (Math.sqrt(dx*dx + dy*dy) < m) { tooClose = true; break; }
      }
      if (tooClose) continue;
    }
    return { x, y };
  }
  return { x: b.minX + b.w / 2, y: b.minY + b.h / 2 };
}

// Detect object type based on bounding box aspect ratio
// MacBook (top-down): wider than tall → ratio > 1.2
// Backpack (diagonal front): taller than wide → ratio < 0.9
// Ambiguous in between → generic random
function detectObject(b) {
  const ratio = b.w / b.h;
  if (ratio > 1.15) return 'macbook';
  if (ratio < 0.92) return 'backpack';
  return 'generic';
}

// Map a relative [rx, ry] (0..1 within bounds) to absolute canvas coords
function rel(rx, ry, b) {
  return { x: b.minX + rx * b.w, y: b.minY + ry * b.h };
}

// Clamp a point inside the path with jitter
function jitter(p, amt) {
  return { x: p.x + (Math.random() - 0.5) * amt, y: p.y + (Math.random() - 0.5) * amt };
}

function generatePoints() {
  const b = getBounds();
  if (!b) return;
  const margin = Math.min(b.w, b.h) * 0.10;
  const maxR = Math.min(b.w, b.h) * 0.20;

  chronoPoints = [];
  heatPoints   = [];

  const thermalValue = { red: 0.92, orange: 0.72, yellow: 0.55, green: 0.38, blue: 0.20, lightblue: 0.08 };
  const colorDefs2 = {
    red:       { core: [255, 15,  0  ], halo: [255, 110, 0  ] },
    orange:    { core: [255, 140, 0  ], halo: [255, 215, 0  ] },
    yellow:    { core: [255, 228, 0  ], halo: [255, 245, 140] },
    green:     { core: [20,  200, 60 ], halo: [90,  240, 130] },
    blue:      { core: [20,  55,  220], halo: [60,  130, 255] },
    lightblue: { core: [55,  175, 255], halo: [150, 225, 255] },
  };

  // All 6 colors always present, each gets 1-2 blobs
  const palette = ['red', 'orange', 'yellow', 'green', 'blue', 'lightblue'];
  const allAssignments = [];
  palette.forEach(color => {
    const blobCount = 1 + Math.floor(Math.random() * 2); // 1 or 2 blobs per color
    for (let i = 0; i < blobCount; i++) allAssignments.push(color);
  });

  // Place blobs: same color can be close (they merge), different colors need spacing
  const placed = []; // { x, y, color, r }
  const minCrossSpacing = maxR * 2.2; // min distance between DIFFERENT colors

  for (const color of allAssignments) {
    let p = null;
    for (let attempt = 0; attempt < 300; attempt++) {
      const candidate = randomInPath(margin);
      if (!candidate) continue;
      const crossConflict = placed.some(pp => {
        if (pp.color === color) return false; // same color: allow close
        const dx = pp.x - candidate.x, dy = pp.y - candidate.y;
        return Math.sqrt(dx*dx + dy*dy) < minCrossSpacing;
      });
      if (!crossConflict) { p = candidate; break; }
    }
    if (!p) {
      // Fallback: place anywhere inside without margin
      p = randomInPath(0);
      if (!p) continue;
    }

    const r = maxR * (0.5 + Math.random() * 0.5);
    placed.push({ ...p, color, r });
    heatPoints.push({ x: p.x, y: p.y, r, v: thermalValue[color], color });
    // F/C chronoPoints: only contact colors (red, orange, yellow)
    if (['red', 'orange', 'yellow'].includes(color)) {
      chronoPoints.push(p);
    }
  }

  // Cap chronoPoints at 4-8
  while (chronoPoints.length > 8) chronoPoints.pop();
  if (chronoPoints.length < 4) {
    // Add random inside points to reach minimum
    for (let i = chronoPoints.length; i < 4; i++) {
      const p = randomInPath(margin);
      if (p) chronoPoints.push(p);
    }
  }

  // Sort hottest → coldest for reveal order
  heatOrdered = [...heatPoints].sort((a, b) => b.v - a.v);
}

// Show brief "scanning" label
let detectedObject = null;
function showScanLabel(obj) {
  const labels = { macbook: 'MacBook Air detected', backpack: 'Backpack detected', generic: 'Object detected' };
  const el = document.getElementById('scan-label');
  el.textContent = labels[obj] || 'Object detected';
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2200);
}

// MacBook contact zones (top-down view):
// Keyboard: y 52-72% of height, x 8-92%
// Most used keys (center row): y 58-68%, x 15-85%
// Trackpad: y 75-92%, x 28-72%
// Top hinge area: y 0-8%, x 10-90%
// Power/Touch ID top right: y 50-55%, x 88-95%
function generateMacBook(b) {
  const zones = [
    // Frequency & Chronology points — realistic high-contact areas
    rel(0.50, 0.62, b), // spacebar center
    rel(0.35, 0.60, b), // left home row (A,S,D,F)
    rel(0.65, 0.60, b), // right home row (J,K,L)
    rel(0.50, 0.83, b), // trackpad center
    rel(0.38, 0.83, b), // trackpad left
    rel(0.62, 0.83, b), // trackpad right
    rel(0.90, 0.53, b), // delete key
    rel(0.50, 0.55, b), // number row center
  ];

  // Pick 4-8 of those with small jitter
  const shuffled = zones.sort(() => Math.random() - 0.5);
  const count = 4 + Math.floor(Math.random() * 5);
  chronoPoints = shuffled.slice(0, count).map(p => jitter(p, b.w * 0.03));

  // Heatmap — hot zones: keyboard area and trackpad
  heatPoints = [];
  const hc = 24 + Math.floor(Math.random() * 6);
  const maxR = Math.max(b.w, b.h) * 0.38;

  // Hot keyboard region
  const keyboardZone = [
    { rx: 0.50, ry: 0.62, v: 0.95 },
    { rx: 0.35, ry: 0.60, v: 0.90 },
    { rx: 0.65, ry: 0.60, v: 0.88 },
    { rx: 0.50, ry: 0.57, v: 0.82 },
    { rx: 0.25, ry: 0.63, v: 0.75 },
    { rx: 0.75, ry: 0.63, v: 0.75 },
    { rx: 0.90, ry: 0.53, v: 0.85 }, // delete
    // Trackpad hot
    { rx: 0.50, ry: 0.83, v: 0.88 },
    { rx: 0.40, ry: 0.80, v: 0.80 },
    { rx: 0.60, ry: 0.80, v: 0.80 },
    // Cool zones: screen area, sides
    { rx: 0.50, ry: 0.25, v: 0.15 },
    { rx: 0.20, ry: 0.30, v: 0.10 },
    { rx: 0.80, ry: 0.30, v: 0.12 },
    { rx: 0.10, ry: 0.65, v: 0.20 },
    { rx: 0.90, ry: 0.65, v: 0.18 },
  ];

  keyboardZone.forEach(z => {
    const p = rel(z.rx, z.ry, b);
    heatPoints.push({ ...jitter(p, b.w * 0.04), r: maxR * (0.4 + Math.random() * 0.5), v: z.v });
  });

  // Fill remaining with random inside path
  for (let i = heatPoints.length; i < hc; i++) {
    const p = randomInPath();
    if (p) heatPoints.push({ ...p, r: maxR * (0.3 + Math.random() * 0.4), v: Math.random() * 0.4 });
  }
}

// Backpack contact zones (diagonal front view):
// Handle top: y 0-12%, x 30-70%
// Main zipper (diagonal): runs from top-left to mid-right
// Front pocket zipper: y 35-55%, x 20-75%
// Side zipper pulls: x 15-25%, y 40-70%
// Base: y 88-100%, x 20-80%
// Shoulder strap attachment: x 10-20%, y 15-35%
function generateBackpack(b) {
  const zones = [
    rel(0.50, 0.06, b), // handle top center
    rel(0.42, 0.06, b), // handle left
    rel(0.58, 0.06, b), // handle right
    rel(0.35, 0.42, b), // front zipper left pull
    rel(0.62, 0.38, b), // front zipper right
    rel(0.20, 0.55, b), // side zipper pull
    rel(0.50, 0.93, b), // base center
    rel(0.15, 0.25, b), // strap top attachment
  ];

  const shuffled = zones.sort(() => Math.random() - 0.5);
  const count = 4 + Math.floor(Math.random() * 5);
  chronoPoints = shuffled.slice(0, count).map(p => jitter(p, b.w * 0.04));

  heatPoints = [];
  const hc = 24 + Math.floor(Math.random() * 6);
  const maxR = Math.max(b.w, b.h) * 0.38;

  const backpackZone = [
    { rx: 0.50, ry: 0.06, v: 0.95 }, // handle — hottest
    { rx: 0.42, ry: 0.06, v: 0.92 },
    { rx: 0.58, ry: 0.06, v: 0.90 },
    { rx: 0.35, ry: 0.42, v: 0.82 }, // front zipper
    { rx: 0.55, ry: 0.38, v: 0.78 },
    { rx: 0.20, ry: 0.55, v: 0.75 }, // side zipper
    { rx: 0.20, ry: 0.65, v: 0.70 },
    { rx: 0.15, ry: 0.25, v: 0.68 }, // strap
    { rx: 0.50, ry: 0.93, v: 0.55 }, // base
    { rx: 0.40, ry: 0.93, v: 0.50 },
    // Cool zones: main body panels
    { rx: 0.65, ry: 0.60, v: 0.15 },
    { rx: 0.70, ry: 0.75, v: 0.12 },
    { rx: 0.55, ry: 0.70, v: 0.18 },
    { rx: 0.80, ry: 0.50, v: 0.10 },
  ];

  backpackZone.forEach(z => {
    const p = rel(z.rx, z.ry, b);
    heatPoints.push({ ...jitter(p, b.w * 0.04), r: maxR * (0.4 + Math.random() * 0.5), v: z.v });
  });

  for (let i = heatPoints.length; i < hc; i++) {
    const p = randomInPath();
    if (p) heatPoints.push({ ...p, r: maxR * (0.3 + Math.random() * 0.4), v: Math.random() * 0.3 });
  }
}

function generateGeneric(b) {
  const count = 4 + Math.floor(Math.random() * 5);
  chronoPoints = [];
  for (let i = 0; i < count; i++) { const p = randomInPath(); if (p) chronoPoints.push(p); }
  heatPoints = [];
  const hc = 22 + Math.floor(Math.random() * 8);
  const maxR = Math.max(b.w, b.h) * 0.45;
  for (let i = 0; i < hc; i++) {
    const p = randomInPath();
    if (p) heatPoints.push({ ...p, r: maxR * (0.5 + Math.random() * 0.5), v: Math.random() });
  }
}

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!pathClosed) return;
    const mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    stopChrono(); stopFreq(); stopHeat();
    if (activeMode === mode) { activeMode = null; redraw(); return; }
    btn.classList.add('active');
    activeMode = mode;
    if (mode === 'C') startChrono();
    if (mode === 'F') startFreq();
    if (mode === 'I') startHeat();
    redraw();
  });
});

function stopChrono() { if (chronoTimer) { clearInterval(chronoTimer); chronoTimer = null; } chronoStep = 0; }
function startChrono() {
  chronoStep = 0;
  chronoTimer = setInterval(() => {
    chronoStep++;
    redraw();
    if (chronoStep >= chronoPoints.length) {
      clearInterval(chronoTimer);
      chronoTimer = null;
    }
  }, 850);
}

// F: all points fade in together over 2 seconds via RAF
function stopFreq() { freqStartTime = null; freqAnimating = false; }
function startFreq() {
  freqStartTime = performance.now();
  freqAnimating = true;
}

// I: each zone fades in over 3s, next starts at 1.5s after previous begins
let heatStartTimes = [];
let heatAnimating  = false;

function stopHeat() {
  if (heatTimer) { clearTimeout(heatTimer); heatTimer = null; }
  heatStep = 0;
  heatStartTimes = [];
  heatAnimating  = false;
}

function startHeat() {
  const now = performance.now();
  const groupOrder = ['red', 'orange', 'yellow', 'green', 'blue', 'lightblue'];
  const groupStartMap = {};
  let delay = 0;
  groupOrder.forEach(color => {
    const hasColor = heatOrdered.some(h => h.color === color);
    if (hasColor) {
      groupStartMap[color] = now + delay;
      delay += 1500;
    }
  });
  heatStartTimes = heatOrdered.map(h => groupStartMap[h.color] || now);
  heatAnimating = true;
  const totalDuration = delay + 3000;
  heatTimer = setTimeout(() => {
    heatAnimating = false;
    heatTimer = null;
    redraw();
  }, totalDuration);
}

// Clear
clearBtn.addEventListener('click', () => {
  path = []; pathClosed = false; activeMode = null;
  stopChrono(); stopFreq(); stopHeat();
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  clearBtn.style.display = 'none';
  clearPH.style.display  = 'block';
  hint.style.opacity     = '1';
  modeHint.style.opacity = '0';
  redraw();
});

// Capture
captureBtn.addEventListener('click', () => {
  const cc = document.getElementById('capture-canvas');
  cc.width  = canvas.width;
  cc.height = canvas.height;
  const cctx = cc.getContext('2d');
  try { cctx.drawImage(video, 0, 0, cc.width, cc.height); } catch(e) {}
  cctx.drawImage(canvas, 0, 0);

  // Flash
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.transition = 'opacity 0.4s'; flash.style.opacity = '0'; }, 60);
  setTimeout(() => { flash.style.transition = ''; }, 500);

  const url = cc.toDataURL('image/png');
  const a   = document.createElement('a');
  a.href    = url;
  a.download = 'FIC_scan.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

function buildPathShape() {
  ctx.beginPath();
  if (path.length < 2) return;
  ctx.moveTo(path[0].x, path[0].y);
  for (let i = 1; i < path.length - 1; i++) {
    const mx = (path[i].x + path[i+1].x) / 2;
    const my = (path[i].y + path[i+1].y) / 2;
    ctx.quadraticCurveTo(path[i].x, path[i].y, mx, my);
  }
  ctx.lineTo(path[path.length-1].x, path[path.length-1].y);
  if (pathClosed) ctx.closePath();
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!path.length) return;

  ctx.save();
  buildPathShape();

  if (!pathClosed) {
    ctx.strokeStyle = 'rgba(100,210,255,0.8)';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.stroke();
    ctx.restore();
    return;
  }

  // Solid perimeter glow
  ctx.shadowColor = 'rgba(80,190,255,0.6)';
  ctx.shadowBlur  = 6;
  ctx.strokeStyle = 'rgba(100,215,255,0.92)';
  ctx.lineWidth   = 2;
  ctx.setLineDash([]);
  ctx.stroke();
  ctx.restore();

  if (!activeMode) return;

  // Effects inside clip
  ctx.save();
  buildPathShape();
  ctx.clip();

  if      (activeMode === 'F') drawFrequency();
  else if (activeMode === 'I') drawIntensity();
  else if (activeMode === 'C') drawChronology();

  ctx.restore();

  // Re-draw perimeter on top
  ctx.save();
  buildPathShape();
  ctx.shadowColor = 'rgba(80,190,255,0.5)';
  ctx.shadowBlur  = 5;
  ctx.strokeStyle = 'rgba(100,215,255,0.92)';
  ctx.lineWidth   = 2;
  ctx.stroke();
  ctx.restore();
}

// FREQUENCY — all points fade in together over 2 seconds, purple color
function drawFrequency() {
  let opacity = 1.0;
  if (freqStartTime !== null) {
    const elapsed = performance.now() - freqStartTime;
    opacity = Math.min(elapsed / freqDuration, 1.0);
    // Smooth easing
    opacity = opacity < 0.5 ? 2 * opacity * opacity : -1 + (4 - 2 * opacity) * opacity;
  }

  chronoPoints.forEach(p => {
    const r = 10;

    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 1.6);
    grad.addColorStop(0,   `rgba(180,80,255,${0.60 * opacity})`);
    grad.addColorStop(0.5, `rgba(130,40,220,${0.25 * opacity})`);
    grad.addColorStop(1,   'rgba(80,0,180,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 1.6, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    const core = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 0.75);
    core.addColorStop(0,   `rgba(230,190,255,${0.95 * opacity})`);
    core.addColorStop(0.5, `rgba(190,120,255,${0.55 * opacity})`);
    core.addColorStop(1,   'rgba(140,60,240,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 0.75, 0, Math.PI * 2);
    ctx.fillStyle = core;
    ctx.fill();
  });
}

// INTENSITY — each color rendered on its own offscreen canvas so same-color blobs merge organically
function drawIntensity() {
  const now = performance.now();
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr;
  const H = canvas.height / dpr;

  // Black base fades in with first zone
  let baseOpacity = 0;
  if (heatStartTimes.length > 0) {
    const elapsed = now - heatStartTimes[0];
    let t = Math.min(Math.max(elapsed / 3000, 0), 1);
    t = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    baseOpacity = t * 0.30;
  }
  if (baseOpacity > 0) {
    ctx.fillStyle = `rgba(0,0,0,${baseOpacity})`;
    ctx.fill();
  }

  const colorDefs = {
    red:       { core: [255, 15,  0  ], halo: [255, 110, 0  ] },
    orange:    { core: [255, 140, 0  ], halo: [255, 215, 0  ] },
    yellow:    { core: [255, 228, 0  ], halo: [255, 245, 140] },
    green:     { core: [20,  200, 60 ], halo: [90,  240, 130] },
    blue:      { core: [20,  55,  220], halo: [60,  130, 255] },
    lightblue: { core: [55,  175, 255], halo: [150, 225, 255] },
  };

  // Group blobs by color, track per-group opacity (use earliest blob's startTime for the group)
  const groups = {};
  heatOrdered.forEach((h, i) => {
    if (!groups[h.color]) groups[h.color] = { blobs: [], startTime: heatStartTimes[i] };
    groups[h.color].blobs.push(h);
    // Use earliest start time for the group
    if (heatStartTimes[i] < groups[h.color].startTime) groups[h.color].startTime = heatStartTimes[i];
  });

  // Draw each color group on its own offscreen canvas, then composite onto main
  Object.entries(groups).forEach(([color, group]) => {
    const startTime = group.startTime;
    if (!startTime) return;
    const elapsed = now - startTime;
    if (elapsed < 0) return;

    let t = Math.min(elapsed / 3000, 1.0);
    t = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    if (t <= 0) return;

    const def = colorDefs[color] || colorDefs.blue;
    const [cr, cg, cb] = def.core;
    const [hr2, hg2, hb2] = def.halo;

    // Create offscreen canvas for this color
    const offscreen = document.createElement('canvas');
    offscreen.width  = W;
    offscreen.height = H;
    const octx = offscreen.getContext('2d');
    octx.imageSmoothingEnabled = true;
    octx.imageSmoothingQuality = 'high';

    group.blobs.forEach(h => {
      // Halo — wider, very soft
      const haloGrad = octx.createRadialGradient(h.x, h.y, h.r * 0.4, h.x, h.y, h.r * 1.35);
      haloGrad.addColorStop(0,   `rgba(${hr2},${hg2},${hb2},0.18)`);
      haloGrad.addColorStop(0.5, `rgba(${hr2},${hg2},${hb2},0.08)`);
      haloGrad.addColorStop(1,   `rgba(${hr2},${hg2},${hb2},0)`);
      octx.beginPath();
      octx.arc(h.x, h.y, h.r * 1.35, 0, Math.PI * 2);
      octx.fillStyle = haloGrad;
      octx.fill();

      // Core — gaussian blob, blobs of same color naturally merge on shared canvas
      const coreGrad = octx.createRadialGradient(h.x, h.y, 0, h.x, h.y, h.r);
      coreGrad.addColorStop(0,    `rgba(${cr},${cg},${cb},0.88)`);
      coreGrad.addColorStop(0.25, `rgba(${cr},${cg},${cb},0.70)`);
      coreGrad.addColorStop(0.55, `rgba(${cr},${cg},${cb},0.38)`);
      coreGrad.addColorStop(0.80, `rgba(${cr},${cg},${cb},0.12)`);
      coreGrad.addColorStop(1,    `rgba(${cr},${cg},${cb},0)`);
      octx.beginPath();
      octx.arc(h.x, h.y, h.r, 0, Math.PI * 2);
      octx.fillStyle = coreGrad;
      octx.fill();
    });

    // Composite this color layer onto main canvas at current fade opacity
    ctx.globalAlpha = t;
    ctx.drawImage(offscreen, 0, 0);
    ctx.globalAlpha = 1.0;
  });
}

// CHRONOLOGY — sequential colored numbered points
const CHRONO_COLORS = [
  { fill: 'rgba(255,240,0,0.95)',  glow: 'rgba(255,240,0,0.35)'  },
  { fill: 'rgba(255,185,0,0.95)',  glow: 'rgba(255,185,0,0.35)'  },
  { fill: 'rgba(255,120,0,0.95)',  glow: 'rgba(255,120,0,0.35)'  },
  { fill: 'rgba(255,55,0,0.95)',   glow: 'rgba(255,55,0,0.35)'   },
  { fill: 'rgba(220,0,0,0.95)',    glow: 'rgba(220,0,0,0.35)'    },
];

function drawChronology() {
  const showing = Math.min(chronoStep, chronoPoints.length);
  for (let i = 0; i < showing; i++) {
    const p = chronoPoints[i];
    const c = CHRONO_COLORS[Math.min(i, CHRONO_COLORS.length - 1)];

    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 36);
    grad.addColorStop(0, c.glow);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, 36, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
    ctx.fillStyle = c.fill;
    ctx.fill();

    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, p.x, p.y);
  }
}

// Render loop — drives F and I fade-in animations
function loop() {
  if (pathClosed && activeMode === 'F' && freqAnimating) redraw();
  if (pathClosed && activeMode === 'I' && heatAnimating) redraw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
